name: reparto
description: "JustBUY — A Multi-Campus Marketplace System for Students and Vendors."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Backend
  supabase_flutter: ^2.5.6

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Config / env
  flutter_dotenv: ^5.1.0

  # Local preferences (theme mode persistence)
  shared_preferences: ^2.3.2

  # Utilities
  intl: ^0.19.0
  google_fonts: ^6.2.1

  # Image upload (logos, product photos, KYC)
  image_picker: ^1.1.2

  # Paystack hosted checkout (WebView on mobile) / browser launch
  webview_flutter: ^4.8.0
  url_launcher: ^6.3.0

  # Push notifications (Firebase Cloud Messaging)
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^17.2.2

  # Google sign-in (native, for reliable mobile OAuth)
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - .env
