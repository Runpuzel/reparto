name: reparto
description: "UjustBUY - A Multi-Campus Marketplace for Students and Vendors."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Backend
  supabase_flutter: ^2.5.6

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Config / env
  flutter_dotenv: ^5.1.0

  # Local preferences (theme mode persistence)
  shared_preferences: ^2.3.2

  # Utilities
  intl: ^0.19.0
  google_fonts: ^6.2.1

  # UI / design system
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # Image upload (logos, product photos, KYC)
  image_picker: ^1.1.2

  # Paystack hosted checkout (WebView on mobile) / browser launch
  webview_flutter: ^4.8.0
  url_launcher: ^6.3.0

  # Push notifications (Firebase Cloud Messaging)
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^17.2.2

  # Google sign-in (native, for reliable mobile OAuth)
  google_sign_in: ^6.2.1
  google_sign_in_web: ^0.12.4+4

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  # Generates Android/iOS/web launcher icons from a single source image.
  flutter_launcher_icons: ^0.14.1
  # Generates the native launch (splash) screen showing the logo.
  flutter_native_splash: ^2.4.1

# Run:  dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#F3F7F8"
    theme_color: "#0E6E74"

# Run:  dart run flutter_native_splash:create
# Shows the UjustBUY logo on the brand-neutral background while the app starts.
flutter_native_splash:
  color: "#F3F7F8"
  image: assets/icon/app_icon.png
  android_12:
    image: assets/icon/app_icon.png
    color: "#F3F7F8"
  web: true

flutter:
  uses-material-design: true
  assets:
    # Config file. `env.txt` (no leading dot) is what Netlify serves on web,
    # since hosts hide dotfiles like `.env`. `.env` is kept for local dev.
    - env.txt
    - assets/icon/app_icon.png