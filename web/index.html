<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Ujustbuy is an online shopping store for quality products, student sellers, campus services, deals, and easy ordering in Ghana.">
  <meta name="keywords" content="Ujustbuy, UjustBUY, online shopping Ghana, campus marketplace, student sellers, Ghana student marketplace">
  <meta name="author" content="Ujustbuy">
  <meta name="robots" content="index, follow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-signin-client_id" content="873661910045-fbst7jq4mqrqlin0040hrrdlljm4l9aq.apps.googleusercontent.com">
  <link rel="canonical" href="https://ujustbuy.store/">

  <title>Ujustbuy - Online Shopping Store</title>
  <meta property="og:site_name" content="Ujustbuy">
  <meta property="og:title" content="Ujustbuy - Online Shopping Store">
  <meta property="og:description" content="Ujustbuy is an online shopping store for quality products, student sellers, campus services, deals, and easy ordering in Ghana.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ujustbuy.store/">
  <meta property="og:image" content="https://ujustbuy.store/app_icon.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Ujustbuy - Online Shopping Store">
  <meta name="twitter:description" content="Shop products and services from student sellers with Ujustbuy.">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="app_icon.png"/>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "OnlineStore",
      "name": "Ujustbuy",
      "alternateName": "UjustBUY",
      "url": "https://ujustbuy.store/",
      "description": "Ujustbuy is an online shopping store for quality products, student sellers, campus services, deals, and easy ordering in Ghana.",
      "logo": "https://ujustbuy.store/app_icon.png",
      "sameAs": []
    }
  </script>

  <style>
    body { margin: 0; background: #F6F3F5; overflow: hidden; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; flex-direction: column; font-family: sans-serif;
      color: #8E153E; background: #F6F3F5; z-index: 9999;
    }
    #loading img { width: 80px; height: auto; margin-bottom: 20px; }
    @media (prefers-color-scheme: dark) {
      body, #loading { background: #120F11; }
      #loading { color: #8E153E; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <img src="app_icon.png" alt="UjustBUY" />
    <p>Loading UjustBUY…</p>
  </div>

  <!-- Required by passkeys_web. Load it before Flutter initializes plugins. -->
  <script>
    window.ujustbuyDeferredInstallPrompt = null;

    window.ujustbuyInstallApp = async function() {
      const standalone = window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true;
      if (standalone) return 'installed';

      const promptEvent = window.ujustbuyDeferredInstallPrompt;
      if (!promptEvent) return 'unavailable';

      promptEvent.prompt();
      const choice = await promptEvent.userChoice;
      window.ujustbuyDeferredInstallPrompt = null;
      return choice && choice.outcome ? choice.outcome : 'dismissed';
    };

    window.addEventListener('beforeinstallprompt', function(event) {
      event.preventDefault();
      window.ujustbuyDeferredInstallPrompt = event;
    });

    window.addEventListener('appinstalled', function() {
      window.ujustbuyDeferredInstallPrompt = null;
    });
  </script>

  <script src="https://github.com/corbado/flutter-passkeys/releases/download/2.4.0/bundle.js"></script>
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Flutter 3.22+ bootstrap: Hide loader once the app is rendered
    window.addEventListener('load', function() {
      const observer = new MutationObserver(function(mutations) {
        if (document.querySelector('flutter-view')) {
          const loader = document.getElementById('loading');
          if (loader) loader.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });

      // Fallback: Force hide after 12 seconds
      setTimeout(function() {
        const loader = document.getElementById('loading');
        if (loader && loader.style.display !== 'none') {
          loader.style.display = 'none';
        }
      }, 12000);
    });
  </script>
</body>
</html>
