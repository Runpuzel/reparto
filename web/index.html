  <style>
    :root {
      color-scheme: light dark;
      --brand: #0E6E74;
      --brand-navy: #072450;
      --page: #F3F7F8;
      --surface: #FFFFFF;
      --text: #10283E;
      --muted: #465E6C;
      --border: #B9CBCD;
      --soft: #EAF1F2;
    }
    html, body { margin: 0; width: 100%; height: 100%; }
    body {
      overflow: hidden; background: var(--page); color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #loading {
      position: fixed; inset: 0; z-index: 9999; isolation: isolate;
      display: flex; align-items: flex-start; justify-content: center;
      box-sizing: border-box; padding: 24px; overflow-x: hidden; overflow-y: auto;
      overscroll-behavior: none;
      background:
        radial-gradient(circle at 108% -12%, rgba(14, 110, 116, .14), rgba(14, 110, 116, 0) 48%),
        radial-gradient(circle at -10% 112%, rgba(7, 36, 80, .10), rgba(7, 36, 80, 0) 48%),
        var(--page);
      opacity: 1; visibility: visible;
      transition: opacity 360ms cubic-bezier(.22, 1, .36, 1), visibility 0s linear 360ms;
    }
    #loading.is-leaving { opacity: 0; visibility: hidden; pointer-events: none; }
    .loading-shell {
      flex: none; width: min(100%, 420px); margin: auto 0; padding: 16px 0;
      text-align: center;
      animation: loading-enter 480ms cubic-bezier(.22, 1, .36, 1) both;
    }
    .loading-logo {
      position: relative; display: grid; place-items: center;
      width: 132px; height: 132px; margin: 0 auto 24px;
    }
    .loading-logo::before {
      content: ''; position: absolute; inset: -16px; border-radius: 50%;
      background: radial-gradient(circle, rgba(14, 110, 116, .20), rgba(14, 110, 116, 0) 68%);
      animation: loading-breathe 1.6s ease-in-out infinite alternate;
    }
    .loading-logo img {
      position: relative; width: 124px; height: 124px; box-sizing: border-box;
      object-fit: contain; padding: 4px; border: 1px solid rgba(14, 110, 116, .18);
      border-radius: 27px; background: #FFFFFF;
      box-shadow: 0 16px 42px rgba(7, 36, 80, .14);
    }
    .loading-title {
      display: block; color: var(--text); font-size: 32px;
      line-height: 1.15; letter-spacing: -1.1px; font-weight: 800;
    }
    .loading-tagline {
      display: block; margin-top: 8px; color: var(--muted);
      font-size: 15px; line-height: 1.5; font-weight: 550;
    }
    #loading-copy {
      margin: 34px 0 0; color: var(--muted); font-size: 12.5px;
      line-height: 1.45; font-weight: 650;
    }
    .loading-track {
      width: 156px; height: 5px; margin: 14px auto 0; overflow: hidden;
      border-radius: 999px; background: rgba(14, 110, 116, .14);
    }
    .loading-track::after {
      content: ''; display: block; width: 44%; height: 100%; border-radius: inherit;
      background: linear-gradient(90deg, var(--brand), #1595A0);
      animation: loading-sweep 1.15s cubic-bezier(.4, 0, .2, 1) infinite;
    }
    #offline-preview { display: none; margin-top: 30px; text-align: left; }
    html.is-offline #loading-copy, html.is-offline .loading-track { display: none; }
    html.is-offline #offline-preview { display: block; }
    .offline-status {
      display: flex; align-items: center; gap: 9px; margin-bottom: 18px;
      color: var(--text); font-size: 16px; font-weight: 750;
    }
    .offline-dot { width: 9px; height: 9px; border-radius: 50%; background: #C5283D; }
    .offline-search {
      height: 46px; margin-bottom: 16px; border: 1px solid var(--border);
      border-radius: 12px; background: var(--surface);
    }
    .preview-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .preview-item {
      min-width: 0; overflow: hidden; border: 1px solid var(--border);
      border-radius: 12px; background: var(--surface);
    }
    .preview-image { aspect-ratio: 4 / 3; background: var(--soft); }
    .preview-lines { padding: 11px; }
    .preview-line { height: 8px; border-radius: 999px; background: #C8D9DB; }
    .preview-line + .preview-line { width: 62%; margin-top: 9px; background: var(--soft); }
    .offline-note {
      margin: 18px 0 0; color: var(--muted); font-size: 13px;
      line-height: 1.5; text-align: center;
    }
    @keyframes loading-enter {
      from { opacity: 0; transform: translateY(10px) scale(.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes loading-breathe {
      from { opacity: .55; transform: scale(.96); }
      to { opacity: 1; transform: scale(1.05); }
    }
    @keyframes loading-sweep {
      from { transform: translateX(-120%); }
      to { transform: translateX(330%); }
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --page: #0E1519; --surface: #151E23; --text: #F1FAFA;
        --muted: #C7DADC; --border: #3B4D58; --soft: #243038;
      }
      .loading-logo img { border-color: rgba(98, 190, 196, .34); }
      .preview-line { background: #3B4D58; }
    }
    @media (max-height: 560px) {

      #loading-copy { margin-top: 22px; }
    }
    @media (prefers-reduced-motion: reduce) {
      #loading, .loading-shell, .loading-logo::before, .loading-track::after {
        animation: none; transition-duration: 1ms; transition-delay: 0s;
      }
      .loading-track::after { transform: translateX(0); }

  <!-- Required by passkeys_web. Load it before Flutter initializes plugins. -->
  <script>
    window.ujustbuyDeferredInstallPrompt = null;
    window.ujustbuyInstallPromptWaiters = [];

    window.ujustbuyWaitForInstallPrompt = function() {
      if (window.ujustbuyDeferredInstallPrompt) {
        return Promise.resolve(window.ujustbuyDeferredInstallPrompt);
      }

      return new Promise(function(resolve) {
        let settled = false;
        const complete = function(promptEvent) {
          if (settled) return;
          settled = true;
          resolve(promptEvent);
        };
        window.ujustbuyInstallPromptWaiters.push(complete);
        setTimeout(function() { complete(null); }, 1800);
      });
    };

    window.ujustbuyInstallApp = async function() {
      const standalone = window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true;
      if (standalone) return 'installed';

      const promptEvent = window.ujustbuyDeferredInstallPrompt ||
        await window.ujustbuyWaitForInstallPrompt();
      if (!promptEvent) return 'unavailable';

      await promptEvent.prompt();
      const choice = await promptEvent.userChoice;
      window.ujustbuyDeferredInstallPrompt = null;
      return choice && choice.outcome ? choice.outcome : 'dismissed';
    };

    window.addEventListener('beforeinstallprompt', function(event) {
      event.preventDefault();
      window.ujustbuyDeferredInstallPrompt = event;
      const waiters = window.ujustbuyInstallPromptWaiters.splice(0);
      waiters.forEach(function(complete) { complete(event); });
    });

    window.addEventListener('appinstalled', function() {
      window.ujustbuyDeferredInstallPrompt = null;
    });
  </script>

  <script>
    let flutterStarted = false;
    let loaderDismissed = false;
    let passkeysReady = false;
    let passkeysLoadStarted = false;
    let firstFrameWatchdog = null;

    function resetStartupStatus() {
      const copy = document.getElementById('loading-copy');
      const track = document.querySelector('.loading-track');
      if (copy) copy.textContent = 'Opening your marketplace...';
      if (track) track.style.removeProperty('display');
    }

    function showStartupError(message) {
      const copy = document.getElementById('loading-copy');
      const track = document.querySelector('.loading-track');
      if (copy) copy.textContent = message;
      if (track) track.style.display = 'none';
    }

    function dismissLoadingScreen() {
      if (loaderDismissed) return;
      const loader = document.getElementById('loading');
      if (!loader) return;
      loaderDismissed = true;
      if (firstFrameWatchdog) clearTimeout(firstFrameWatchdog);
      loader.setAttribute('aria-hidden', 'true');
      requestAnimationFrame(function() {
        loader.classList.add('is-leaving');
      });
      setTimeout(function() { loader.remove(); }, 440);
    }

    window.addEventListener('flutter-first-frame', function() {
      if (firstFrameWatchdog) clearTimeout(firstFrameWatchdog);
      setTimeout(dismissLoadingScreen, 80);
    }, { once: true });

    function loadPasskeys() {
      if (passkeysReady || passkeysLoadStarted) return;
      passkeysLoadStarted = true;
      resetStartupStatus();

      const script = document.createElement('script');
      let settled = false;
      let timeout = null;
      const fail = function(message) {
        if (settled) return;
        settled = true;
        if (timeout) clearTimeout(timeout);
        passkeysLoadStarted = false;
        script.onload = null;
        script.onerror = null;
        script.remove();
        showStartupError(message);
      };
      timeout = setTimeout(function() {
        fail('Secure sign-in took too long to prepare. Refresh to try again.');
      }, 10000);
      script.src = 'https://github.com/corbado/flutter-passkeys/releases/download/2.4.0/bundle.js';
      script.async = true;
      script.onload = function() {
        if (settled) return;
        settled = true;
        clearTimeout(timeout);
        passkeysLoadStarted = false;
        passkeysReady = true;
        startFlutter();
      };
      script.onerror = function() {
        fail('Unable to prepare secure sign-in. Refresh to try again.');
      };
      document.head.appendChild(script);
    }

    function startFlutter() {
      if (flutterStarted) return;
      if (!navigator.onLine) {
        document.documentElement.classList.add('is-offline');
        return;
      }
      document.documentElement.classList.remove('is-offline');
      if (!passkeysReady) {
        loadPasskeys();
        return;
      }
      resetStartupStatus();
      flutterStarted = true;

      const script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      script.async = true;
      script.onerror = function() {
        if (firstFrameWatchdog) clearTimeout(firstFrameWatchdog);
        flutterStarted = false;
        if (!navigator.onLine) {
          document.documentElement.classList.add('is-offline');
          return;
        }
        showStartupError('Unable to open UjustBUY. Refresh to try again.');
      };
      document.body.appendChild(script);
      firstFrameWatchdog = setTimeout(function() {
        showStartupError('UjustBUY is still starting. Check your connection or refresh.');
      }, 20000);
    }

    if (!navigator.onLine) document.documentElement.classList.add('is-offline');

    window.addEventListener('DOMContentLoaded', startFlutter);
    window.addEventListener('online', startFlutter);
    window.addEventListener('offline', function() {
      document.documentElement.classList.add('is-offline');
    });

  </script>
