  <!-- Required by passkeys_web. Load it before Flutter initializes plugins. -->
  <script>
    window.ujustbuyDeferredInstallPrompt = null;
    window.ujustbuyInstallPromptWaiters = [];

    window.ujustbuyWaitForInstallPrompt = function() {
      if (window.ujustbuyDeferredInstallPrompt) {
        return Promise.resolve(window.ujustbuyDeferredInstallPrompt);
      }

      return new Promise(function(resolve) {
        let settled = false;
        const complete = function(promptEvent) {
          if (settled) return;
          settled = true;
          resolve(promptEvent);
        };
        window.ujustbuyInstallPromptWaiters.push(complete);
        setTimeout(function() { complete(null); }, 1800);
      });
    };

    window.ujustbuyInstallApp = async function() {
      const standalone = window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true;
      if (standalone) return 'installed';

      const promptEvent = window.ujustbuyDeferredInstallPrompt ||
        await window.ujustbuyWaitForInstallPrompt();
      if (!promptEvent) return 'unavailable';

      await promptEvent.prompt();
      const choice = await promptEvent.userChoice;
      window.ujustbuyDeferredInstallPrompt = null;
      return choice && choice.outcome ? choice.outcome : 'dismissed';
    };

    window.addEventListener('beforeinstallprompt', function(event) {
      event.preventDefault();
      window.ujustbuyDeferredInstallPrompt = event;
      const waiters = window.ujustbuyInstallPromptWaiters.splice(0);
      waiters.forEach(function(complete) { complete(event); });
    });

    window.addEventListener('appinstalled', function() {
      window.ujustbuyDeferredInstallPrompt = null;
    });
  </script>

  <script src="https://github.com/corbado/flutter-passkeys/releases/download/2.4.0/bundle.js" defer></script>

  <script>
    let flutterStarted = false;

    function startFlutter() {
      if (flutterStarted || !navigator.onLine) return;
      flutterStarted = true;
      document.documentElement.classList.remove('is-offline');

      const script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      script.async = true;
      script.onerror = function() {
        flutterStarted = false;
        if (!navigator.onLine) document.documentElement.classList.add('is-offline');
      };
      document.body.appendChild(script);
    }

    if (!navigator.onLine) document.documentElement.classList.add('is-offline');

    window.addEventListener('DOMContentLoaded', startFlutter);
    window.addEventListener('online', startFlutter);
    window.addEventListener('offline', function() {
      document.documentElement.classList.add('is-offline');
    });

    const observer = new MutationObserver(function() {
      if (document.querySelector('flutter-view')) {
        const loader = document.getElementById('loading');
        if (loader) loader.style.display = 'none';
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
